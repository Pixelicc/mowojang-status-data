name: Archive Status Data

on:
  schedule:
    - cron: "22 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Install Bun Runtume
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Install Dependencies
        run: bun install
      - name: Generate .csv File
        run: bun run index.ts
      - name: Get Yesterday's Date
        id: date
        run: echo "date=$(date -d "yesterday" +'%Y-%m-%d')" >> $GITHUB_OUTPUT
      - uses: EndBug/add-and-commit@v10
        with:
          add: '["data/${{ steps.date.outputs.date }}.csv","data/index.csv"]'
          message: "Archive for ${{ steps.date.outputs.date }}"
          default_author: "github_actions"
